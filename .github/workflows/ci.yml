
name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake

      - name: Build
        run: |
          mkdir build
          cd build
          cmake ..
          make -j$(nproc)

      - name: Run tests
        run: |
          cd build
          ctest
